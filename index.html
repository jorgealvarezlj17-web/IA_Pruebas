
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Jorge</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background-color: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reporte Diario</h2>
        <button onclick="copiarReporte()">COPIAR CÓDIGO DE REPORTE</button>
    </div>
    <script>
        function copiarReporte() {
            const codigo = "ESTADO: ACTIVO\nSINCERIZADO: OK\nLISTO PARA DATOS";
            navigator.clipboard.writeText(codigo);
            alert("Código de reporte copiado al portapapeles");
        }
    </script>
</body>
</html>
